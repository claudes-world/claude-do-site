<svg id="ambig" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" role="img" aria-label="Diagram: Chat A and Chat B both deliver in-flight messages to an agent mid-turn; the agent calls reply with no target specified, leaving two ambiguous candidates.">
  <style>
    .d1 { animation: blink 1.4s infinite; }
    .d2 { animation: blink 1.4s infinite 0.2s; }
    .d3 { animation: blink 1.4s infinite 0.4s; }
    @keyframes blink { 0%,100%{opacity:.25} 50%{opacity:1} }
    @media (prefers-reduced-motion: reduce) {
      .d1, .d2, .d3 { animation: none !important; opacity: 1 !important; }
    }
  </style>
  <rect x="0" y="0" width="900" height="500" fill="#141210"/>
  <g>
    <rect x="50" y="30" width="280" height="80" rx="14" fill="#1f1c19" stroke="#d97757" stroke-width="2"/>
    <text x="190" y="62" text-anchor="middle" fill="#fafaf7" font-size="18" font-weight="700">Chat A</text>
    <text x="190" y="86" text-anchor="middle" fill="#c9c2b8" font-size="13">new message arrives</text>
    <rect x="235" y="16" width="90" height="22" rx="11" fill="#d97757"/>
    <text x="280" y="31" text-anchor="middle" fill="#141210" font-size="11" font-weight="700">IN-FLIGHT</text>

    <rect x="570" y="30" width="280" height="80" rx="14" fill="#1f1c19" stroke="#d97757" stroke-width="2"/>
    <text x="710" y="62" text-anchor="middle" fill="#fafaf7" font-size="18" font-weight="700">Chat B</text>
    <text x="710" y="86" text-anchor="middle" fill="#c9c2b8" font-size="13">new message arrives</text>
    <rect x="575" y="16" width="90" height="22" rx="11" fill="#d97757"/>
    <text x="620" y="31" text-anchor="middle" fill="#141210" font-size="11" font-weight="700">IN-FLIGHT</text>

    <rect x="300" y="190" width="300" height="100" rx="14" fill="#1f1c19" stroke="#fafaf7" stroke-width="2"/>
    <text x="450" y="228" text-anchor="middle" fill="#fafaf7" font-size="19" font-weight="700">Agent — mid-turn</text>
    <text x="450" y="252" text-anchor="middle" fill="#c9c2b8" font-size="13">composing a reply</text>
    <g fill="#d97757">
      <circle class="d1" cx="424" cy="270" r="4"/>
      <circle class="d2" cx="450" cy="270" r="4"/>
      <circle class="d3" cx="476" cy="270" r="4"/>
    </g>

    <rect x="300" y="350" width="300" height="80" rx="14" fill="#241a15" stroke="#d97757" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="450" y="384" text-anchor="middle" fill="#fafaf7" font-size="17" font-weight="700">reply() called</text>
    <text x="450" y="406" text-anchor="middle" fill="#e3a88f" font-size="13">no target specified</text>

    <path d="M190,110 L 420,196" stroke="#8a8378" stroke-width="2" fill="none" marker-end="url(#arrowA)"/>
    <path d="M710,110 L 480,196" stroke="#8a8378" stroke-width="2" fill="none" marker-end="url(#arrowA)"/>
    <line x1="450" y1="290" x2="450" y2="345" stroke="#8a8378" stroke-width="2" marker-end="url(#arrowA)"/>

    <path d="M360,430 L 190,462" stroke="#d97757" stroke-width="2" fill="none" stroke-dasharray="5 5"/>
    <path d="M540,430 L 710,462" stroke="#d97757" stroke-width="2" fill="none" stroke-dasharray="5 5"/>

    <rect x="60" y="460" width="260" height="30" rx="8" fill="none" stroke="#8a8378" stroke-width="1.5" stroke-dasharray="3 4"/>
    <text x="190" y="480" text-anchor="middle" fill="#c9c2b8" font-size="13">candidate: Chat A?</text>

    <rect x="580" y="460" width="260" height="30" rx="8" fill="none" stroke="#8a8378" stroke-width="1.5" stroke-dasharray="3 4"/>
    <text x="710" y="480" text-anchor="middle" fill="#c9c2b8" font-size="13">candidate: Chat B?</text>
  </g>
  <defs>
    <marker id="arrowA" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8a8378"/>
    </marker>
  </defs>
</svg>
