<svg viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" role="img" aria-label="Diagram: session start serves five one-line index cards, the agent writes its own search query, hybrid keyword-plus-semantic retrieval runs, and a found match returns an answer while a miss gets exactly one retry with a refined query before the system explicitly abstains instead of guessing.">
  <rect x="0" y="0" width="1200" height="820" fill="#141210" rx="14"/>
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b8478"/>
    </marker>
    <marker id="a1c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e8916f"/>
    </marker>
    <marker id="a1t" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2fc4b4"/>
    </marker>
  </defs>

  <!-- session start -->
  <rect x="500" y="28" width="200" height="58" rx="10" fill="#1a1714" stroke="#2fc4b4" stroke-width="2"/>
  <text x="600" y="63" text-anchor="middle" fill="#ece7dd" font-size="16" font-weight="bold">SESSION START</text>

  <path d="M 600 86 L 600 122" stroke="#2fc4b4" stroke-width="2.5" fill="none" marker-end="url(#a1t)"/>

  <!-- five index cards -->
  <g>
    <rect x="110" y="126" width="180" height="92" rx="10" fill="#1a1714" stroke="#3a352e" stroke-width="1.5"/>
    <text x="200" y="154" text-anchor="middle" fill="#ece7dd" font-size="14" font-weight="bold">card 1</text>
    <text x="200" y="176" text-anchor="middle" fill="#8b8478" font-size="11.5">one curated</text>
    <text x="200" y="192" text-anchor="middle" fill="#8b8478" font-size="11.5">line, not the</text>
    <text x="200" y="208" text-anchor="middle" fill="#8b8478" font-size="11.5">full memory</text>
  </g>
  <g>
    <rect x="310" y="126" width="180" height="92" rx="10" fill="#1a1714" stroke="#3a352e" stroke-width="1.5"/>
    <text x="400" y="154" text-anchor="middle" fill="#ece7dd" font-size="14" font-weight="bold">card 2</text>
    <text x="400" y="180" text-anchor="middle" fill="#8b8478" font-size="11.5">librarian-</text>
    <text x="400" y="196" text-anchor="middle" fill="#8b8478" font-size="11.5">written</text>
  </g>
  <g>
    <rect x="510" y="126" width="180" height="92" rx="10" fill="#1a1714" stroke="#3a352e" stroke-width="1.5"/>
    <text x="600" y="154" text-anchor="middle" fill="#ece7dd" font-size="14" font-weight="bold">card 3</text>
    <text x="600" y="180" text-anchor="middle" fill="#8b8478" font-size="11.5">dated +</text>
    <text x="600" y="196" text-anchor="middle" fill="#8b8478" font-size="11.5">supersede flag</text>
  </g>
  <g>
    <rect x="710" y="126" width="180" height="92" rx="10" fill="#1a1714" stroke="#3a352e" stroke-width="1.5"/>
    <text x="800" y="154" text-anchor="middle" fill="#ece7dd" font-size="14" font-weight="bold">card 4</text>
    <text x="800" y="180" text-anchor="middle" fill="#8b8478" font-size="11.5">topic-linked</text>
  </g>
  <g>
    <rect x="910" y="126" width="180" height="92" rx="10" fill="#1a1714" stroke="#3a352e" stroke-width="1.5"/>
    <text x="1000" y="154" text-anchor="middle" fill="#ece7dd" font-size="14" font-weight="bold">card 5</text>
    <text x="1000" y="180" text-anchor="middle" fill="#8b8478" font-size="11.5">index-only,</text>
    <text x="1000" y="196" text-anchor="middle" fill="#8b8478" font-size="11.5">cheap to serve</text>
  </g>
  <text x="600" y="242" text-anchor="middle" fill="#8b8478" font-size="12.5">five tiny cards replace dumping the whole memory index into context</text>

  <path d="M 600 250 L 600 286" stroke="#8b8478" stroke-width="2" fill="none" marker-end="url(#a1)"/>

  <!-- agent writes its own query -->
  <rect x="430" y="290" width="340" height="70" rx="10" fill="#1a1714" stroke="#e8916f" stroke-width="2"/>
  <text x="600" y="320" text-anchor="middle" fill="#ece7dd" font-size="15.5" font-weight="bold">agent writes its own query</text>
  <text x="600" y="342" text-anchor="middle" fill="#e8916f" font-size="12">not a benchmark-perfect query</text>

  <path d="M 600 360 L 600 396" stroke="#8b8478" stroke-width="2" fill="none" marker-end="url(#a1)"/>

  <!-- hybrid retrieval -->
  <rect x="330" y="400" width="540" height="76" rx="10" fill="#1a1714" stroke="#3a352e" stroke-width="1.5"/>
  <text x="600" y="432" text-anchor="middle" fill="#ece7dd" font-size="16" font-weight="bold">hybrid retrieval — keyword + semantic</text>
  <text x="600" y="456" text-anchor="middle" fill="#8b8478" font-size="12.5">reciprocal-rank fusion over both rankings</text>

  <!-- split -->
  <path d="M 470 476 L 260 522" stroke="#e8916f" stroke-width="2.2" fill="none" marker-end="url(#a1c)"/>
  <text x="260" y="510" text-anchor="middle" fill="#e8916f" font-size="12.5">no confident match</text>

  <path d="M 730 476 L 940 522" stroke="#2fc4b4" stroke-width="2.2" fill="none" marker-end="url(#a1t)"/>
  <text x="940" y="510" text-anchor="middle" fill="#2fc4b4" font-size="12.5">confident match</text>

  <!-- retry once -->
  <rect x="80" y="526" width="360" height="78" rx="10" fill="#1a1714" stroke="#e8916f" stroke-width="2"/>
  <text x="260" y="556" text-anchor="middle" fill="#ece7dd" font-size="15" font-weight="bold">retry once — refined query</text>
  <text x="260" y="580" text-anchor="middle" fill="#8b8478" font-size="12">one retry budget, then stop</text>

  <!-- retry loop back up -->
  <path d="M 80 560 C 20 560, 20 420, 100 420 L 326 420" stroke="#8b8478" stroke-width="1.8" fill="none" stroke-dasharray="5 5" marker-end="url(#a1)"/>
  <text x="150" y="410" fill="#8b8478" font-size="11.5">re-run retrieval</text>

  <!-- confident match box -->
  <rect x="760" y="526" width="360" height="78" rx="10" fill="#1a1714" stroke="#2fc4b4" stroke-width="2"/>
  <text x="940" y="556" text-anchor="middle" fill="#ece7dd" font-size="15" font-weight="bold">confident match found</text>
  <text x="940" y="580" text-anchor="middle" fill="#8b8478" font-size="12">served straight to the agent</text>

  <!-- retry outcome down -->
  <path d="M 260 604 L 260 640" stroke="#8b8478" stroke-width="2" fill="none" marker-end="url(#a1)"/>
  <text x="312" y="626" text-anchor="start" fill="#8b8478" font-size="11.5">still nothing</text>

  <rect x="80" y="644" width="360" height="70" rx="10" fill="#1a1714" stroke="#3a352e" stroke-width="1.5"/>
  <text x="260" y="674" text-anchor="middle" fill="#ece7dd" font-size="14.5" font-weight="bold">explicit abstain</text>
  <text x="260" y="696" text-anchor="middle" fill="#8b8478" font-size="12">"not found" is a valid answer</text>

  <path d="M 940 604 L 940 640" stroke="#8b8478" stroke-width="2" fill="none" marker-end="url(#a1)"/>
  <rect x="760" y="644" width="360" height="70" rx="10" fill="#1a1714" stroke="#3a352e" stroke-width="1.5"/>
  <text x="940" y="674" text-anchor="middle" fill="#ece7dd" font-size="14.5" font-weight="bold">answer returned</text>
  <text x="940" y="696" text-anchor="middle" fill="#8b8478" font-size="12">grounded in a real card</text>

  <!-- merge to bottom rule -->
  <path d="M 260 714 L 260 742 L 940 742" stroke="#8b8478" stroke-width="1.8" fill="none" stroke-dasharray="4 5"/>
  <path d="M 940 714 L 940 742" stroke="#8b8478" stroke-width="1.8" fill="none" stroke-dasharray="4 5"/>
  <path d="M 600 742 L 600 758" stroke="#8b8478" stroke-width="1.8" fill="none" marker-end="url(#a1)"/>

  <rect x="270" y="762" width="660" height="46" rx="10" fill="#0d0c0b" stroke="#2a2622" stroke-width="1.5"/>
  <text x="600" y="791" text-anchor="middle" fill="#b8b1a4" font-size="13.5" font-weight="bold">never a confident wrong answer — an answer, or an honest "not found"</text>
</svg>
