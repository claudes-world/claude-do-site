<svg viewBox="0 0 1200 470" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" role="img" aria-label="The group-side reply path: the agent supplies only text; gate one copies the destination from the stored inbound envelope; gate two, the bridge, re-derives the destination from its own delivery ledger; only then does the reply reach Telegram.">
  <rect x="0" y="0" width="1200" height="470" fill="#141210" rx="14"/>
  <defs>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b8478"/>
    </marker>
    <marker id="arrTealR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2fc4b4"/>
    </marker>
    <marker id="arrRedR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c05f3f"/>
    </marker>
  </defs>

  <!-- inbound context strip (top left) -->
  <rect x="60" y="30" width="500" height="64" rx="10" fill="#0d0c0b" stroke="#3a352e" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="310" y="57" text-anchor="middle" fill="#ece7dd" font-size="14">inbound message &#8594; stored reply context</text>
  <text x="310" y="78" text-anchor="middle" fill="#8b8478" font-size="12.5">chat + thread + message id, keyed by trace</text>

  <!-- delivery ledger (top right) -->
  <rect x="683" y="30" width="250" height="64" rx="10" fill="#0d0c0b" stroke="#3a352e" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="808" y="57" text-anchor="middle" fill="#ece7dd" font-size="14">delivery ledger</text>
  <text x="808" y="78" text-anchor="middle" fill="#8b8478" font-size="12.5">what was delivered, where</text>

  <!-- agent -->
  <rect x="60" y="180" width="200" height="84" rx="10" fill="#141210" stroke="#3a352e" stroke-width="1.5"/>
  <text x="160" y="212" text-anchor="middle" fill="#ece7dd" font-size="15" font-weight="bold">the agent</text>
  <text x="160" y="234" text-anchor="middle" fill="#2fc4b4" font-size="12.5">supplies: text only</text>
  <text x="160" y="253" text-anchor="middle" fill="#8b8478" font-size="12">destination? not allowed</text>

  <!-- agent -> gate 1 -->
  <path d="M 260 222 L 326 222" stroke="#2fc4b4" stroke-width="2.5" fill="none" marker-end="url(#arrTealR)"/>
  <text x="293" y="208" text-anchor="middle" fill="#2fc4b4" font-size="12">text</text>

  <!-- gate 1 -->
  <rect x="330" y="168" width="280" height="108" rx="10" fill="#141210" stroke="#e8916f" stroke-width="2"/>
  <text x="470" y="198" text-anchor="middle" fill="#e8916f" font-size="14" font-weight="bold">GATE 1 &#183; reply tool</text>
  <text x="470" y="222" text-anchor="middle" fill="#ece7dd" font-size="12.5">copies chat + thread from the</text>
  <text x="470" y="241" text-anchor="middle" fill="#ece7dd" font-size="12.5">stored inbound context</text>
  <text x="470" y="262" text-anchor="middle" fill="#8b8478" font-size="12">picks which message, never where</text>

  <!-- context feed into gate 1 -->
  <path d="M 400 94 L 455 164" stroke="#8b8478" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#arrR)"/>

  <!-- gate 1 -> gate 2 -->
  <path d="M 610 222 L 664 222" stroke="#8b8478" stroke-width="2.5" fill="none" marker-end="url(#arrR)"/>

  <!-- gate 2 -->
  <rect x="668" y="168" width="280" height="108" rx="10" fill="#141210" stroke="#e8916f" stroke-width="2"/>
  <text x="808" y="198" text-anchor="middle" fill="#e8916f" font-size="14" font-weight="bold">GATE 2 &#183; the bridge</text>
  <text x="808" y="222" text-anchor="middle" fill="#ece7dd" font-size="12.5">ignores even gate 1&#8217;s values &#8212;</text>
  <text x="808" y="241" text-anchor="middle" fill="#ece7dd" font-size="12.5">re-derives from its own ledger</text>
  <text x="808" y="262" text-anchor="middle" fill="#8b8478" font-size="12">&#8220;the anti-forgery property&#8221;</text>

  <!-- ledger feed into gate 2 -->
  <path d="M 808 94 L 808 164" stroke="#8b8478" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#arrR)"/>

  <!-- gate 2 -> telegram -->
  <path d="M 948 222 L 1000 222" stroke="#2fc4b4" stroke-width="2.5" fill="none" marker-end="url(#arrTealR)"/>

  <!-- telegram -->
  <rect x="1004" y="176" width="146" height="92" rx="10" fill="#141210" stroke="#3a352e" stroke-width="1.5"/>
  <text x="1077" y="210" text-anchor="middle" fill="#ece7dd" font-size="15" font-weight="bold">Telegram</text>
  <text x="1077" y="234" text-anchor="middle" fill="#8b8478" font-size="12">right chat,</text>
  <text x="1077" y="250" text-anchor="middle" fill="#8b8478" font-size="12">right thread</text>

  <!-- forbidden direct path, label clear below the curve -->
  <path d="M 160 264 C 160 340, 300 366, 600 366 C 900 366, 1077 340, 1077 272" stroke="#c05f3f" stroke-width="1.8" fill="none" stroke-dasharray="6 5" opacity="0.7" marker-end="url(#arrRedR)"/>
  <text x="600" y="394" text-anchor="middle" fill="#c05f3f" font-size="12.5">&#10007; no direct route &#8212; an agent can never aim a reply itself</text>

  <!-- bottom line -->
  <text x="600" y="438" text-anchor="middle" fill="#b8b1a4" font-size="14">the group-and-topic reply path: destination pinned twice, by two systems that don&#8217;t take each other&#8217;s word for it</text>
</svg>
