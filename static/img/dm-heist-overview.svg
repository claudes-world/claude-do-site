<svg viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" role="img" aria-label="Overview: two separate Telegram systems. On the WorldOS side one switchboard polls per bot token and writes a flat inbox; the bridge routes envelopes to mailboxes or types them into terminals. On the DM side one plugin instance polls and sibling sessions run send-only.">
  <rect x="0" y="0" width="1200" height="680" fill="#141210" rx="14"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b8478"/>
    </marker>
    <marker id="arrCoral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e8916f"/>
    </marker>
    <marker id="arrTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2fc4b4"/>
    </marker>
  </defs>

  <!-- Telegram -->
  <rect x="240" y="20" width="860" height="64" rx="12" fill="#1a1714" stroke="#3a352e" stroke-width="1.5"/>
  <text x="670" y="48" text-anchor="middle" fill="#ece7dd" font-size="19" font-weight="bold">Telegram</text>
  <text x="670" y="70" text-anchor="middle" fill="#8b8478" font-size="13">one getUpdates reader per bot token &#8212; ever</text>

  <!-- divider + lane titles -->
  <line x1="600" y1="110" x2="600" y2="640" stroke="#2a2622" stroke-width="1" stroke-dasharray="4 6"/>
  <text x="60" y="118" fill="#b8b1a4" font-size="15" font-weight="bold">WORLDOS LANE</text>
  <text x="1140" y="118" text-anchor="end" fill="#b8b1a4" font-size="15" font-weight="bold">DM LANE</text>

  <!-- ===== LEFT: WorldOS ===== -->
  <path d="M 300 84 L 300 164" stroke="#e8916f" stroke-width="2.5" fill="none" marker-end="url(#arrCoral)"/>
  <text x="312" y="122" fill="#e8916f" font-size="12.5">bot token A</text>
  <text x="312" y="140" fill="#e8916f" font-size="12.5">long-poll &#183; the ONE reader</text>

  <rect x="150" y="168" width="300" height="72" rx="10" fill="#141210" stroke="#e8916f" stroke-width="2"/>
  <text x="300" y="198" text-anchor="middle" fill="#ece7dd" font-size="16" font-weight="bold">switchboard</text>
  <text x="300" y="220" text-anchor="middle" fill="#8b8478" font-size="12.5">one poller per bot &#183; one flat inbox</text>

  <path d="M 300 240 L 300 266" stroke="#8b8478" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <rect x="150" y="270" width="300" height="72" rx="10" fill="#141210" stroke="#3a352e" stroke-width="1.5"/>
  <text x="300" y="300" text-anchor="middle" fill="#ece7dd" font-size="16" font-weight="bold">bridge &#183; route table</text>
  <text x="300" y="322" text-anchor="middle" fill="#8b8478" font-size="12.5">(chat, thread) &#8594; where it goes</text>

  <path d="M 230 342 L 160 394" stroke="#8b8478" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 305 342 L 310 394" stroke="#8b8478" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 390 342 L 476 512" stroke="#8b8478" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="490" y="428" fill="#8b8478" font-size="11.5">or: typed straight</text>
  <text x="490" y="444" fill="#8b8478" font-size="11.5">into a live terminal</text>

  <g>
    <rect x="80" y="398" width="150" height="58" rx="8" fill="#0d0c0b" stroke="#3a352e" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="155" y="423" text-anchor="middle" fill="#ece7dd" font-size="13.5">mailbox: topic 1</text>
    <text x="155" y="443" text-anchor="middle" fill="#8b8478" font-size="12">envelope files</text>
  </g>
  <g>
    <rect x="235" y="398" width="150" height="58" rx="8" fill="#0d0c0b" stroke="#3a352e" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="310" y="423" text-anchor="middle" fill="#ece7dd" font-size="13.5">mailbox: topic 2</text>
    <text x="310" y="443" text-anchor="middle" fill="#8b8478" font-size="12">envelope files</text>
  </g>

  <path d="M 155 456 L 155 512" stroke="#8b8478" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 310 456 L 310 512" stroke="#8b8478" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <g>
    <rect x="80" y="516" width="150" height="58" rx="8" fill="#141210" stroke="#3a352e" stroke-width="1.5"/>
    <text x="155" y="541" text-anchor="middle" fill="#ece7dd" font-size="13.5">thread agent</text>
    <text x="155" y="561" text-anchor="middle" fill="#8b8478" font-size="12">reads its mailbox</text>
  </g>
  <g>
    <rect x="235" y="516" width="150" height="58" rx="8" fill="#141210" stroke="#3a352e" stroke-width="1.5"/>
    <text x="310" y="541" text-anchor="middle" fill="#ece7dd" font-size="13.5">thread agent</text>
    <text x="310" y="561" text-anchor="middle" fill="#8b8478" font-size="12">reads its mailbox</text>
  </g>
  <g>
    <rect x="405" y="516" width="150" height="58" rx="8" fill="#141210" stroke="#3a352e" stroke-width="1.5"/>
    <text x="480" y="541" text-anchor="middle" fill="#ece7dd" font-size="13.5">terminal agent</text>
    <text x="480" y="561" text-anchor="middle" fill="#8b8478" font-size="12">turn typed in</text>
  </g>
  <text x="300" y="612" text-anchor="middle" fill="#8b8478" font-size="13">agents never touch Telegram &#8212; zero tokens, zero polling</text>

  <!-- ===== RIGHT: DM plugin ===== -->
  <path d="M 900 84 L 900 164" stroke="#e8916f" stroke-width="2.5" fill="none" marker-end="url(#arrCoral)"/>
  <text x="912" y="122" fill="#e8916f" font-size="12.5">bot token B</text>
  <text x="912" y="140" fill="#e8916f" font-size="12.5">long-poll &#183; the ONE reader</text>

  <rect x="760" y="168" width="280" height="86" rx="10" fill="#141210" stroke="#e8916f" stroke-width="2"/>
  <text x="900" y="198" text-anchor="middle" fill="#ece7dd" font-size="16" font-weight="bold">session 1 &#183; plugin server</text>
  <text x="900" y="220" text-anchor="middle" fill="#e8916f" font-size="12.5">holds the lock: bot.pid</text>
  <text x="900" y="240" text-anchor="middle" fill="#8b8478" font-size="12.5">text &#8594; in-memory notification</text>

  <!-- send-only siblings: straight teal arrows up, clear of the poller box -->
  <path d="M 700 318 L 700 90" stroke="#2fc4b4" stroke-width="2" fill="none" marker-end="url(#arrTeal)" opacity="0.9"/>
  <path d="M 1070 318 L 1070 90" stroke="#2fc4b4" stroke-width="2" fill="none" marker-end="url(#arrTeal)" opacity="0.9"/>
  <text x="885" y="302" text-anchor="middle" fill="#2fc4b4" font-size="12.5">sending needs no slot &#8212; any session can send</text>

  <g>
    <rect x="660" y="320" width="210" height="72" rx="10" fill="#141210" stroke="#2fc4b4" stroke-width="1.5"/>
    <text x="765" y="350" text-anchor="middle" fill="#ece7dd" font-size="14.5">session 2 &#183; same server</text>
    <text x="765" y="372" text-anchor="middle" fill="#2fc4b4" font-size="12.5">SEND-ONLY</text>
  </g>
  <g>
    <rect x="890" y="320" width="210" height="72" rx="10" fill="#141210" stroke="#2fc4b4" stroke-width="1.5"/>
    <text x="995" y="350" text-anchor="middle" fill="#ece7dd" font-size="14.5">session 3 &#183; same server</text>
    <text x="995" y="372" text-anchor="middle" fill="#2fc4b4" font-size="12.5">SEND-ONLY</text>
  </g>

  <!-- lesson strip -->
  <rect x="680" y="430" width="440" height="144" rx="10" fill="#0d0c0b" stroke="#2a2622" stroke-width="1.5"/>
  <text x="900" y="466" text-anchor="middle" fill="#b8b1a4" font-size="14" font-weight="bold">THE ASYMMETRY</text>
  <text x="900" y="500" text-anchor="middle" fill="#e8916f" font-size="15">reading needs a single owner</text>
  <text x="900" y="528" text-anchor="middle" fill="#2fc4b4" font-size="15">sending doesn&#8217;t</text>
  <text x="900" y="556" text-anchor="middle" fill="#8b8478" font-size="12.5">both systems are built on this one fact</text>
</svg>
